version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: wifi_renewal_db
    environment:
      POSTGRES_USER: wifi_user
      POSTGRES_PASSWORD: wifi_password
      POSTGRES_DB: wifi_renewal_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wifi_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: wifi_renewal_backend
    environment:
      DATABASE_URL: postgresql://wifi_user:wifi_password@db:5432/wifi_renewal_db
      NODE_ENV: development
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev

volumes:
  postgres_data:
